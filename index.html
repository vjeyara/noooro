<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noooro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell" data-status="idle">

    <header class="app-header">
      <h1 class="logo">noooro</h1>
      <div class="header-right">
        <span class="demo-pill" hidden>demo mode</span>
        <div class="streak-pill" data-status="idle">
          <svg class="streak-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 20h10"/>
            <path d="M10 20c5.5-2.5 .8-6.4 3-10"/>
            <path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
            <path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
          </svg>
          <span class="streak-count">0</span>
          <span class="streak-label">days</span>
          <span class="sr-only" role="status" aria-live="polite">Idle</span>
        </div>
        <button class="icon-btn settings-btn" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="21" y1="6" x2="14" y2="6"/><line x1="10" y1="6" x2="3" y2="6"/>
            <line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="18" x2="16" y2="18"/><line x1="12" y1="18" x2="3" y2="18"/>
            <circle cx="12" cy="6" r="2"/><circle cx="10" cy="12" r="2"/><circle cx="14" cy="18" r="2"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="timer-hero" data-status="idle" aria-label="Pomodoro timer">
      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 200 200" width="300" height="300">
          <circle class="ring-bg" cx="100" cy="100" r="92" />
          <circle class="ring-fg" cx="100" cy="100" r="92" />
        </svg>
        <div class="timer-display">
          <span class="timer-digits-wrap">
            <span class="timer-digits-ghost" aria-hidden="true">88:88</span>
            <span class="timer-digits">25:00</span>
          </span>
        </div>
      </div>
      <p class="timer-task" data-empty="true">Focus</p>
      <div class="timer-actions">
        <button class="btn btn-primary timer-action">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 4l13 8-13 8V4z"/></svg>
          <span>Start</span>
        </button>
        <span class="break-chip">5 min break next</span>
      </div>
    </section>

    <div class="middle-col">

      <section class="today-card" data-empty="true" aria-label="Today's progress">
        <div class="stat-pair">
          <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Pomodoros</div>
          </div>
          <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Minutes focused</div>
          </div>
        </div>
        <div class="weekly-meter" aria-label="This week"></div>
      </section>

      <section class="session-card" aria-label="Current cycle">
        <div class="session-header">
          <span class="session-label">Pomodoro <span class="session-current">1</span> <span class="session-divider">/</span> <span class="session-total">4</span></span>
          <div class="session-dots"></div>
        </div>
        <div class="session-meta">
          <span class="session-meta-item"><strong>25</strong> work</span>
          <span class="session-meta-dot">·</span>
          <span class="session-meta-item"><strong>5</strong> break</span>
          <span class="session-meta-dot">·</span>
          <span class="session-meta-item"><strong>15</strong> long</span>
        </div>
      </section>

      <section class="noise-panel" aria-label="Focus noise">
        <div class="noise-row">
          <div class="noise-chips">
            <button class="chip chip-active" data-noise="off">Off</button>
            <button class="chip" data-noise="brown">Brown</button>
            <button class="chip" data-noise="pink">Pink</button>
            <button class="chip" data-noise="white">White</button>
          </div>
          <input type="range" class="noise-volume-slider" min="0" max="100" value="50" aria-label="Noise volume">
          <canvas class="noise-waveform" width="180" height="24" aria-hidden="true"></canvas>
        </div>
      </section>

      <p class="note" aria-live="polite">First Pomodoro is the hardest. 25 minutes.</p>

    </div>

    <section class="task-section" aria-label="Tasks">
      <div class="task-section-header">
        <span class="task-section-title">Tasks</span>
        <span class="task-section-count">0</span>
      </div>
      <ul class="tasks">
        <li class="task-add">
          <button class="task-add-btn">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add task
          </button>
        </li>
      </ul>
      <button class="tasks-more" hidden>+ <span class="tasks-more-count">0</span> more</button>
    </section>

    <section class="heatmap-section" aria-label="Last 30 days">
      <span class="heatmap-caption">Last 30 days</span>
      <div class="heatmap-grid"></div>
    </section>

  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
